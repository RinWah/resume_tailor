<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI resume tailor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-2xl w-full bg-white rounded-xl shadow-lg p-8">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-slate-800">AI cover letter tailor</h1>
            <p class="text-slate-500 mt-2">upload your resume to generate a better cover letter.</p>
        </header>
        <!-- upload form -->
         <form th:action="@{/api/process-resume}" method="post" enctype="multipart/form-data" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2"your resume (pdf)</label>
                    <input type="file" name="file" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2"job description</label>
                    <textarea name="jobDescription" rows="5" class="w-full border rounded-lg p-3" placeholder="paste the job requirements here!"></textarea>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
                process resume + preview latex
            </button>
        </form>
    </div>
</body>
</html>
